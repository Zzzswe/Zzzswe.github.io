<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlackForest · 显卡压测 | Ray Marching</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            background-color: black;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 16px 24px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border-left: 6px solid #ff4d6d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 100;
        }
        #title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #ff006e;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #ff4d6d, #ffb347, #6a4cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #stats {
            font-size: 1.1rem;
            color: #ddd;
            display: flex;
            gap: 20px;
        }
        #stats span {
            color: #ffaa00;
            font-weight: bold;
        }
        #warning {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-size: 0.8rem;
            background: rgba(20,20,20,0.5);
            padding: 6px 15px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #fps-meter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #0ff;
            font-family: monospace;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid #0ff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            pointer-events: none;
            z-index: 100;
        }
        #note {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ccc;
            background: rgba(0,0,0,0.3);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #title { font-size: 1.5rem; }
            #stats { font-size: 0.9rem; flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="title">⚡ BLACK FOREST ⚡</div>
        <div id="stats">
            <div>🌲 树木数量: <span id="tree-count">22,500</span></div>
            <div>🎨 光线步进: <span>192步/像素</span></div>
            <div>🔥 几何复杂度: <span>~6.7M 隐式面</span></div>
        </div>
    </div>
    <div id="fps-meter">FPS: <span id="fps-value">--</span></div>
    <div id="warning">⚠️ 警告：此页面将使GPU满载运行，用于压力测试 / 烤机。风扇可能高速旋转。</div>
    <div id="note">RAY MARCHING · 彩色森林 · 移动视角自动旋转</div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        // 使用透视相机
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 18, 35);
        camera.lookAt(0, 5, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            powerPreference: "high-performance" 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制一下，避免过载但保持清晰
        document.body.appendChild(renderer.domElement);

        // --- 添加简单的环境光虽然不影响raymarching，但为了规范 ---
        // 实际上全屏着色器不依赖three灯光，但保留
        
        // --- FPS 计数器 ---
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsSpan = document.getElementById('fps-value');
        
        // --- 树木数量显示 (与实际着色器中的网格一致) ---
        // 我们使用 150x150 = 22,500 棵树 (可以根据性能调整，这里固定为压测强度)
        const GRID_SIZE = 150;        // 150x150 = 22500 棵树
        const SPACING = 1.8;          // 间距
        document.getElementById('tree-count').textContent = (GRID_SIZE * GRID_SIZE).toLocaleString();
        
        // --- 创建全屏平面，用于光线步进 ---
        // 使用覆盖整个视口的平面几何体
        const geometry = new THREE.PlaneGeometry(2, 2);
        
        // --- 着色器 uniforms ---
        const uniforms = {
            u_time: { value: 0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_cameraPos: { value: camera.position.clone() },
            u_cameraDir: { value: new THREE.Vector3() },
            u_cameraUp: { value: camera.up.clone() },
            u_cameraRight: { value: new THREE.Vector3() },
            u_fov: { value: 65.0 },
            u_gridSize: { value: GRID_SIZE },
            u_spacing: { value: SPACING }
        };

        // --- 顶点着色器：传递UV和计算射线方向 ---
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vRayDirection;
            
            uniform vec3 u_cameraPos;
            uniform vec3 u_cameraDir;
            uniform vec3 u_cameraUp;
            uniform vec3 u_cameraRight;
            uniform float u_fov;
            uniform vec2 u_resolution;
            
            void main() {
                vUv = uv;
                
                // 计算屏幕空间射线方向 (类似ShaderToy的fragCoord)
                float aspect = u_resolution.x / u_resolution.y;
                vec2 screenPos = (uv * 2.0 - 1.0) * vec2(aspect, 1.0);
                float tanHalfFov = tan(radians(u_fov) * 0.5);
                
                // 相机坐标系下的方向
                vec3 dir = normalize(vec3(screenPos.x * tanHalfFov, screenPos.y * tanHalfFov, -1.0));
                
                // 转换到世界坐标系 (相机基向量)
                // 需要计算相机的朝向矩阵
                vec3 forward = normalize(u_cameraDir);
                vec3 right = normalize(u_cameraRight);
                vec3 up = normalize(u_cameraUp);
                
                vRayDirection = normalize(mat3(right, up, -forward) * dir);
                
                gl_Position = vec4(position, 1.0);
            }
        `;

        // --- 片段着色器：核心光线步进，包含数万棵树的SDF ---
        const fragmentShader = `
            precision highp float;
            varying vec2 vUv;
            varying vec3 vRayDirection;
            
            uniform vec3 u_cameraPos;
            uniform float u_time;
            uniform int u_gridSize;
            uniform float u_spacing;
            uniform vec2 u_resolution;
            
            // 常量
            #define MAX_STEPS 192
            #define MAX_DIST 200.0
            #define SURF_DIST 0.001
            #define PI 3.14159265359
            
            // 光照参数
            const vec3 lightDir = normalize(vec3(0.8, 1.0, 0.5));
            const vec3 lightColor = vec3(1.0, 0.95, 0.85);
            const vec3 ambientColor = vec3(0.12, 0.15, 0.22);
            
            // 随机函数 (用于颜色变化)
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }
            
            float hash3(vec3 p) {
                return fract(sin(dot(p, vec3(12.9898, 78.233, 45.5432))) * 43758.5453);
            }
            
            // HSV 转 RGB
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }
            
            // --- SDF 基本体 ---
            float sdCylinder(vec3 p, vec3 hb) {
                // hb.x = radius, hb.y = height, hb.z = radius (通常相同)
                vec2 d = vec2(length(p.xz), abs(p.y)) - vec2(hb.x, hb.y);
                return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
            }
            
            float sdSphere(vec3 p, float r) {
                return length(p) - r;
            }
            
            float sdCappedCylinder(vec3 p, float r, float h) {
                vec2 d = abs(vec2(length(p.xz), p.y)) - vec2(r, h);
                return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
            }
            
            // 平滑并集 (让树木之间稍微融合，增加艺术感，但不影响性能太多)
            float opSmoothUnion(float d1, float d2, float k) {
                float h = clamp(0.5 + 0.5*(d2 - d1)/k, 0.0, 1.0);
                return mix(d2, d1, h) - k*h*(1.0-h);
            }
            
            // --- 地面 SDF ---
            float sdGround(vec3 p) {
                return p.y - 0.0;  // 地面在 y=0
            }
            
            // --- 核心：遍历所有树木，计算距离 (几万棵树！) ---
            // 同时记录最近的树ID和部件类型 (用于着色)
            struct TreeInfo {
                float dist;
                int type;       // 0: 地面, 1: 树干, 2: 树叶
                vec3 treePos;
                float treeSeed;
            };
            
            TreeInfo mapFull(vec3 p) {
                TreeInfo info;
                info.dist = MAX_DIST;
                info.type = 0;
                info.treePos = vec3(0.0);
                info.treeSeed = 0.0;
                
                // 地面
                float groundDist = sdGround(p);
                if (groundDist < info.dist) {
                    info.dist = groundDist;
                    info.type = 0;
                }
                
                // 网格范围：从 -halfRange 到 halfRange
                float halfRange = float(u_gridSize) * u_spacing * 0.5;
                float offset = -halfRange + u_spacing * 0.5;
                
                // 遍历所有树 —— 注意：这是性能杀手，故意让显卡爆炸！
                // 150x150 = 22500 次迭代每步，乘以192步，再乘以像素数 ≈ 天文数字
                for (int i = 0; i < 150; i++) {
                    for (int j = 0; j < 150; j++) {
                        // 如果网格大小小于150，提前跳出 (但着色器需要编译时常量，这里固定150)
                        if (i >= u_gridSize || j >= u_gridSize) break;
                        
                        float x = offset + float(i) * u_spacing;
                        float z = offset + float(j) * u_spacing;
                        
                        // 添加一些随机扰动，让森林更自然
                        vec2 seed = vec2(float(i) + 0.1, float(j) * 1.3);
                        float rndX = (hash(seed) - 0.5) * 0.7;
                        float rndZ = (hash(seed.yx) - 0.5) * 0.7;
                        vec3 treePos = vec3(x + rndX, 0.0, z + rndZ);
                        
                        // 每棵树独特种子
                        float treeSeed = hash(vec2(float(i)*2.0+1.0, float(j)*3.0));
                        
                        // 树木参数变化
                        float trunkH = 2.8 + treeSeed * 2.0;        // 高度 2.8~4.8
                        float trunkR = 0.35 + treeSeed * 0.2;       // 半径 0.35~0.55
                        float leafScale = 1.1 + treeSeed * 0.8;     // 树叶大小
                        
                        // 将点转换到树的局部坐标
                        vec3 localP = p - treePos;
                        
                        // --- 树干 (圆柱，从 y=0 到 trunkH) ---
                        vec3 trunkP = localP - vec3(0.0, trunkH*0.5, 0.0);
                        float trunkDist = sdCappedCylinder(trunkP, trunkR, trunkH*0.5);
                        
                        // --- 树叶 (多个球体组成树冠，更丰富) ---
                        vec3 leafCenter = vec3(0.0, trunkH + 0.3, 0.0);
                        float leafDist = sdSphere(localP - leafCenter, 1.4 * leafScale);
                        
                        // 次级树叶球体
                        vec3 offset1 = vec3(0.9, 0.5, 0.4) * leafScale;
                        vec3 offset2 = vec3(-0.8, 0.6, -0.7) * leafScale;
                        vec3 offset3 = vec3(0.3, 0.2, -1.1) * leafScale;
                        vec3 offset4 = vec3(-0.6, -0.1, 1.0) * leafScale;
                        
                        float leafDist2 = sdSphere(localP - (leafCenter + offset1), 1.0 * leafScale);
                        float leafDist3 = sdSphere(localP - (leafCenter + offset2), 0.95 * leafScale);
                        float leafDist4 = sdSphere(localP - (leafCenter + offset3), 0.85 * leafScale);
                        float leafDist5 = sdSphere(localP - (leafCenter + offset4), 0.9 * leafScale);
                        
                        // 树叶部分取最小值
                        float treeLeafDist = min(min(min(leafDist, leafDist2), min(leafDist3, leafDist4)), leafDist5);
                        
                        // 树干和树叶取最小值
                        float treeDist = min(trunkDist, treeLeafDist);
                        
                        // 轻微平滑融合，让树更有整体感 (但保持性能)
                        // 使用简单min即可
                        
                        if (treeDist < info.dist) {
                            info.dist = treeDist;
                            info.treePos = treePos;
                            info.treeSeed = treeSeed;
                            
                            // 判断是树干还是树叶
                            // 近似判断：重新计算树干距离和树叶距离，但为了性能，可以用局部高度
                            float relY = localP.y;
                            if (relY < trunkH + 0.2 && length(localP.xz) < trunkR + 0.3 && relY > 0.0) {
                                // 可能是树干区域
                                if (trunkDist < treeLeafDist) {
                                    info.type = 1; // 树干
                                } else {
                                    info.type = 2; // 树叶
                                }
                            } else {
                                info.type = 2; // 树叶
                            }
                        }
                    }
                }
                
                return info;
            }
            
            // 简化版距离函数 (仅返回距离，用于法线计算，不重复记录信息以节省性能)
            float mapDist(vec3 p) {
                float d = sdGround(p);
                float halfRange = float(u_gridSize) * u_spacing * 0.5;
                float offset = -halfRange + u_spacing * 0.5;
                
                for (int i = 0; i < 150; i++) {
                    for (int j = 0; j < 150; j++) {
                        if (i >= u_gridSize || j >= u_gridSize) break;
                        
                        float x = offset + float(i) * u_spacing;
                        float z = offset + float(j) * u_spacing;
                        vec2 seed = vec2(float(i)+0.1, float(j)*1.3);
                        float rndX = (hash(seed)-0.5)*0.7;
                        float rndZ = (hash(seed.yx)-0.5)*0.7;
                        vec3 treePos = vec3(x+rndX, 0.0, z+rndZ);
                        float treeSeed = hash(vec2(float(i)*2.0+1.0, float(j)*3.0));
                        
                        float trunkH = 2.8 + treeSeed * 2.0;
                        float trunkR = 0.35 + treeSeed * 0.2;
                        float leafScale = 1.1 + treeSeed * 0.8;
                        
                        vec3 localP = p - treePos;
                        
                        vec3 trunkP = localP - vec3(0.0, trunkH*0.5, 0.0);
                        float trunkDist = sdCappedCylinder(trunkP, trunkR, trunkH*0.5);
                        
                        vec3 leafCenter = vec3(0.0, trunkH+0.3, 0.0);
                        float leafDist = sdSphere(localP - leafCenter, 1.4*leafScale);
                        vec3 off1 = vec3(0.9,0.5,0.4)*leafScale;
                        vec3 off2 = vec3(-0.8,0.6,-0.7)*leafScale;
                        vec3 off3 = vec3(0.3,0.2,-1.1)*leafScale;
                        vec3 off4 = vec3(-0.6,-0.1,1.0)*leafScale;
                        leafDist = min(leafDist, sdSphere(localP - (leafCenter+off1), 1.0*leafScale));
                        leafDist = min(leafDist, sdSphere(localP - (leafCenter+off2), 0.95*leafScale));
                        leafDist = min(leafDist, sdSphere(localP - (leafCenter+off3), 0.85*leafScale));
                        leafDist = min(leafDist, sdSphere(localP - (leafCenter+off4), 0.9*leafScale));
                        
                        float treeDist = min(trunkDist, leafDist);
                        d = min(d, treeDist);
                    }
                }
                return d;
            }
            
            // 法线计算
            vec3 getNormal(vec3 p) {
                float eps = 0.005;
                vec2 e = vec2(eps, 0.0);
                return normalize(vec3(
                    mapDist(p + e.xyy) - mapDist(p - e.xyy),
                    mapDist(p + e.yxy) - mapDist(p - e.yxy),
                    mapDist(p + e.yyx) - mapDist(p - e.yyx)
                ));
            }
            
            // 获取颜色 (基于命中的树和位置)
            vec3 getColor(vec3 p, TreeInfo info) {
                if (info.type == 0) {
                    // 地面：带点网格和颜色渐变
                    float grid = abs(fract(p.x * 0.5) - 0.5) + abs(fract(p.z * 0.5) - 0.5);
                    vec3 col1 = vec3(0.15, 0.2, 0.12);
                    vec3 col2 = vec3(0.08, 0.1, 0.06);
                    return mix(col1, col2, smoothstep(0.4, 0.6, grid));
                }
                
                vec3 localP = p - info.treePos;
                float seed = info.treeSeed;
                
                if (info.type == 1) {
                    // 树干：棕色系变化
                    float hue = 0.07 + seed * 0.15;
                    float sat = 0.6 + seed * 0.3;
                    float val = 0.4 + seed * 0.4;
                    return hsv2rgb(vec3(hue, sat, val));
                } else {
                    // 树叶：彩色！基于位置和种子
                    float hue = fract(seed * 2.0 + u_time * 0.02);
                    // 让色调更丰富
                    hue = fract(hue + localP.x * 0.1 + localP.z * 0.05);
                    float sat = 0.7 + 0.3 * sin(localP.y * 2.0 + seed * 10.0);
                    float val = 0.6 + 0.4 * cos(seed * 20.0);
                    return hsv2rgb(vec3(hue, sat, val));
                }
            }
            
            // 软阴影 (简单版本)
            float shadow(vec3 ro, vec3 rd, float mint, float maxt) {
                float res = 1.0;
                float t = mint;
                for (int i = 0; i < 32; i++) {
                    float h = mapDist(ro + rd * t);
                    if (h < 0.001) return 0.0;
                    res = min(res, 8.0 * h / t);
                    t += h;
                    if (t > maxt) break;
                }
                return clamp(res, 0.0, 1.0);
            }
            
            void main() {
                vec3 ro = u_cameraPos;
                vec3 rd = normalize(vRayDirection);
                
                // 光线步进
                float t = 0.0;
                TreeInfo info;
                bool hit = false;
                
                for (int i = 0; i < MAX_STEPS; i++) {
                    vec3 p = ro + rd * t;
                    info = mapFull(p);
                    float d = info.dist;
                    
                    if (d < SURF_DIST) {
                        hit = true;
                        break;
                    }
                    if (t > MAX_DIST) break;
                    t += d;
                }
                
                vec3 col;
                if (hit) {
                    vec3 p = ro + rd * t;
                    vec3 normal = getNormal(p);
                    
                    // 获取基础颜色
                    vec3 albedo = getColor(p, info);
                    
                    // 光照
                    vec3 lightDirNorm = lightDir;
                    float diff = max(dot(normal, lightDirNorm), 0.0);
                    float sh = 1.0;
                    if (diff > 0.01) {
                        sh = shadow(p + normal * 0.02, lightDirNorm, 0.05, 8.0);
                    }
                    vec3 diffuse = albedo * lightColor * diff * sh;
                    
                    // 环境光 + 简单边缘光
                    vec3 ambient = albedo * ambientColor;
                    float fresnel = pow(1.0 - max(dot(normal, -rd), 0.0), 3.0);
                    vec3 rim = vec3(0.4, 0.5, 0.8) * fresnel * 0.5;
                    
                    col = ambient + diffuse + rim;
                    
                    // 雾效
                    float fog = exp(-t * 0.015);
                    col = mix(vec3(0.05, 0.08, 0.15), col, fog);
                } else {
                    // 背景：星空渐变
                    vec3 skyColor1 = vec3(0.02, 0.04, 0.12);
                    vec3 skyColor2 = vec3(0.1, 0.05, 0.15);
                    float horizon = pow(1.0 - abs(rd.y), 2.0);
                    col = mix(skyColor1, skyColor2, horizon);
                    // 添加一些星星
                    float star = pow(hash3(rd * 200.0 + u_time), 20.0);
                    col += vec3(star * 0.8);
                }
                
                // 轻微色调映射
                col = pow(col, vec3(1.0 / 1.2));
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        // 创建材质
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --- 辅助：添加一个简单的Three.js物体来表示光源方向？不需要，但可以添加雾效参考？不需要
        
        // --- 相机自动旋转逻辑 ---
        let angle = 0.0;
        const radius = 42.0;
        const height = 18.0;
        
        // --- 更新uniforms中的相机参数 ---
        function updateCameraUniforms() {
            // 计算相机位置 (绕Y轴旋转)
            angle += 0.0025; // 缓慢旋转
            const x = Math.sin(angle) * radius;
            const z = Math.cos(angle) * radius;
            camera.position.set(x, height + Math.sin(angle * 0.5) * 3.0, z);
            camera.lookAt(0, 6, 0);
            
            // 更新uniforms
            uniforms.u_cameraPos.value.copy(camera.position);
            
            // 计算相机方向向量
            const target = new THREE.Vector3(0, 6, 0);
            const dir = new THREE.Vector3().subVectors(target, camera.position).normalize();
            uniforms.u_cameraDir.value.copy(dir);
            
            // 计算相机的right和up (用于构建射线)
            const up = new THREE.Vector3(0, 1, 0);
            const right = new THREE.Vector3().crossVectors(dir, up).normalize();
            const correctedUp = new THREE.Vector3().crossVectors(right, dir).normalize();
            uniforms.u_cameraRight.value.copy(right);
            uniforms.u_cameraUp.value.copy(correctedUp);
            
            uniforms.u_fov.value = camera.fov;
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新时间和相机
            uniforms.u_time.value += 0.01;
            updateCameraUniforms();
            
            renderer.render(scene, camera);
            
            // FPS 计算
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 200) {
                const fps = (frameCount * 1000) / (now - lastTime);
                fpsSpan.textContent = fps.toFixed(1);
                frameCount = 0;
                lastTime = now;
            }
        }
        
        animate();

        // --- 窗口大小自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        }

        // 显示初始化完成
        console.log('🔥 BlackForest 压测已启动 - 树木数量: ' + (GRID_SIZE * GRID_SIZE));
    </script>
</body>
</html>
